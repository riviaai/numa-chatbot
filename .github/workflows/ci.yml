name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Syntax check
        run: node -c server.js

      - name: Server starts successfully
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 5
          curl -sf http://localhost:3456/api/health || (kill $SERVER_PID 2>/dev/null; exit 1)
          kill $SERVER_PID 2>/dev/null
        env:
          NODE_ENV: test
          PORT: 3456

      - name: Run tests (if script exists)
        run: |
          if npm run test --if-present 2>/dev/null; then
            echo "Tests passed"
          else
            echo "No test script found, skipping"
          fi
